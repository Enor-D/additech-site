<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADDITECH — Аддитивные технологии</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
}

.hero h1 {
  font-size: 64px;
  margin-bottom: 20px;
}

.hero p {
  font-size: 20px;
  color: #aaa;
}

/* SECTION */
.section {
  padding: 120px 0;
}

.section-title {
  font-size: 42px;
  margin-bottom: 60px;
}

/* GALLERY */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
}

.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  cursor: pointer;
}

.gallery-item img {
  width: 100%;
  transition: 0.6s;
}

.gallery-item:hover img {
  transform: scale(1.08);
  filter: brightness(1.2);
}

.gallery-item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.08), transparent);
  opacity: 0;
  transition: 0.3s;
}

.gallery-item:hover::after {
  opacity: 1;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.lightbox.active {
  opacity: 1;
  pointer-events: auto;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* CONTACT */
.contact {
  text-align: center;
}

.btn {
  background: #b87333;
  padding: 15px 30px;
  color: white;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>ADDITECH</h1>
    <p>Аддитивные технологии и 3D-печать металлом</p>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="container">
    <h2 class="section-title">Примеры деталей</h2>

    <div class="gallery-grid">

      <div class="gallery-item">
        <img src="cinematic_studio_part_25.png">
      </div>

      <div class="gallery-item">
        <img src="cinematic_studio_part_27.png">
      </div>

      <div class="gallery-item">
        <img src="cinematic_studio_part_29.png">
      </div>

    </div>
  </div>
</section>

<!-- CONTACT -->
<section class="section contact">
  <div class="container">
    <h2>Связаться</h2>
    <p>+7 775 484 44 80</p>
    <a class="btn" href="https://wa.me/77754844480">Написать в WhatsApp</a>
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const imgs = document.querySelectorAll('.gallery-item img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

imgs.forEach(img => {
  img.onclick = () => {
    lightbox.classList.add('active');
    lightboxImg.src = img.src;
  }
});

lightbox.onclick = () => {
  lightbox.classList.remove('active');
};
</script>

</body>
</html>
